<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>MiniDots</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="app">

<!--==================================================
ЭКРАН ПОВОРОТА УСТРОЙСТВА
===================================================-->

<div id="rotateScreen">

    <div id="rotateContent">

        <h1>📱</h1>

        <h2>Поверните устройство</h2>

        <p>
            MiniDots работает только
            в альбомном режиме.
        </p>

    </div>

</div>
 
<!--==================================================
ГЛАВНОЕ МЕНЮ
===================================================-->

    <div id="mainMenu" class="screen">

        <h1>MINI DOTS</h1>

        <button id="playButton">
        Играть
        </button>

        <button id="bestiaryButton">
        Бестиарий
        </button>

        <button id="settingsButton">
        Настройки
        </button>

        <button id="exitButton">
        Выход
        </button>

    </div>

<!--==================================================
ЭКРАН ВЫБОРА РЕЖИМА
===================================================-->

<div id="modeMenu" class="screen">

    <h1>Выбор режима</h1>

    <button>1 vs 1</button>

    <button>3 vs 3</button>

    <button>5 vs 5</button>

    <button id="backToMainMenuButton">
    Назад

</button>

</div>

<!--==================================================
МОДАЛЬНОЕ ОКНО
===================================================-->

<div id="modalOverlay">

    <div id="modalWindow">

        <h2 id="modalTitle">
            Добро пожаловать!
        </h2>

        <p id="modalText">
            Для лучшего игрового опыта рекомендуется
            включить полноэкранный режим.
        </p>

        <div id="modalButtons">

            <button id="modalAcceptButton">

                Включить

            </button>

            <button id="modalCancelButton">

                Позже

            </button>

        </div>

    </div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
